services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-worker:
    image: local/server-app:latest
    build:
      context: .
    command: celery -A celery_config.celery_app worker --loglevel=info --concurrency=1
    volumes:
      - ./downloads:/app/downloads
      - ./dados_processados:/app/dados_processados
    environment: &common-env
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on: &redis-depends
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "celery", "-A", "celery_config.celery_app", "inspect", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-beat:
    image: local/server-app:latest
    command: celery -A celery_config.celery_app beat --loglevel=info
    volumes:
      - ./downloads:/app/downloads
      - ./dados_processados:/app/dados_processados
    environment: *common-env
    env_file:
      - .env
    depends_on: *redis-depends
    restart: unless-stopped

  # flower:
  #   build: .
  #   command: celery -A celery_config.celery_app --broker=redis://redis:6379/0 flower --port=5555 
  #   ports:
  #     - "5555:5555"
  #   environment:
  #     - REDIS_URL=redis://redis:6379/0
  #   env_file:
  #     - .env
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #   restart: unless-stopped

  flask-app:
    image: local/server-app:latest
    ports:
      - "8000:8000"
    volumes:
      - ./downloads:/app/downloads
      - ./dados_processados:/app/dados_processados
    environment: *common-env
    env_file:
      - .env
    depends_on: *redis-depends
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
